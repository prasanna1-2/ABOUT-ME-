<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prasanna Sapkota | DAKU</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #030303;
    color: white;
    font-family: 'Outfit', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* STATUS BOX */
.status-box {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #0c0c0c;
    border: 1px solid #1a1a1a;
    padding: 10px 18px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.is-online {
    border-left: 4px solid #00ff00;
    color: #00ff00;
    box-shadow: 0 0 15px rgba(0,255,0,0.3);
}

.is-offline {
    border-left: 4px solid red;
    color: red;
}

.checking {
    border-left: 4px solid #ffaa00;
    color: #ffaa00;
}

.dot {
    width: 8px;
    height: 8px;
    background: #ffaa00;
    border-radius: 50%;
    animation: pulse 1s infinite;
}

.dots::after {
    content: "";
    animation: dots 1.2s steps(3, end) infinite;
}

@keyframes dots {
    0% { content: ""; }
    33% { content: "."; }
    66% { content: ".."; }
    100% { content: "..."; }
}

@keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.5; }
    50% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(0.8); opacity: 0.5; }
}

/* CONTAINER */
.container {
    text-align: center;
    max-width: 600px;
    padding: 20px;
}

.card {
    background: #0c0c0c;
    border: 1px solid #1a1a1a;
    padding: 25px;
    border-radius: 20px;
    margin-bottom: 15px;
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 20px;
    object-fit: cover;
    object-position: center 25%;
    box-shadow: 0 0 15px rgba(255,255,255,0.05);
    margin-bottom: 10px;
}

.name {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.verified {
    width: 18px;
    height: 18px;
    display: inline-flex;
    cursor: pointer;
    transition: 0.3s;
}

.verified:hover {
    transform: scale(1.2);
}

.verified svg {
    width: 100%;
    height: 100%;
}

.social a {
    color: gray;
    margin: 0 12px;
    font-size: 22px;
    transition: 0.3s;
}

.social a:hover {
    color: white;
}

/* 🔥 POPUP */
.popup {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #111;
    border: 1px solid #222;
    padding: 14px 25px;
    border-radius: 12px;
    font-weight: 600;
    opacity: 0;
    transition: 0.4s ease;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.popup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<!-- STATUS -->
<div id="status-indicator" class="status-box checking">
    <span class="dot"></span>
    CHECKING<span class="dots"></span>
</div>

<div class="container">

    <div class="card">
        <img class="avatar" src="https://i.ibb.co/84R6QK11/adiyogi-lord-shiva-1080x1920-14420.png">

        <h2 class="name">
            Prasanna Sapkota

            <!-- VERIFIED -->
            <span class="verified" onclick="showPopup()">
                <svg viewBox="0 0 24 24" fill="#1877F2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M7 12.5L10 15L17 9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </h2>

        <p>Future Developer • Grade 9</p>
    </div>

    <div class="card">
        <p>I am Prasanna Sapkota (DAKU). Learning Python and building my future in development.</p>
    </div>

    <div class="card social">
        <a href="https://www.facebook.com/share/18G5JyVsy4/"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/coding_with_dakuu"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/9779748303931"><i class="fab fa-whatsapp"></i></a>
    </div>

</div>

<!-- 🔥 POPUP ELEMENT -->
<div id="popup" class="popup">✔ DAKU OFC VERIFIED</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBxCJJLsZQtlwPyW3gWvl2dO25-eSpOYEg",
  databaseURL: "https://ff-tournament-app-abcf0-default-rtdb.firebaseio.com",
  projectId: "ff-tournament-app-abcf0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const el = document.getElementById("status-indicator");

let statusValue = null;
let connected = false;
let loaded = false;

function setChecking() {
    el.className = "status-box checking";
    el.innerHTML = `<span class="dot"></span> CHECKING<span class="dots"></span>`;
}

function updateUI() {
    if (!loaded || !connected) {
        setChecking();
        return;
    }

    el.classList.remove("is-online","is-offline","checking");

    if (statusValue === "online") {
        el.innerText = "● ONLINE";
        el.classList.add("is-online");
    } else {
        el.innerText = "● OFFLINE";
        el.classList.add("is-offline");
    }
}

setChecking();

db.ref("status").on("value", (snap) => {
    statusValue = snap.val();
    loaded = true;
    updateUI();
});

db.ref(".info/connected").on("value", (snap) => {
    connected = snap.val();
    updateUI();
});

/* 🔥 POPUP FUNCTION */
function showPopup() {
    const popup = document.getElementById("popup");
    popup.classList.add("show");

    setTimeout(() => {
        popup.classList.remove("show");
    }, 2500);
}
</script>

</body>
</html>
