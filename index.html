<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    background: #030303;
    color: white;
    font-family: 'Outfit', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* STATUS BOX */
.status-box {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #0c0c0c;
    border: 1px solid #1a1a1a;
    padding: 10px 20px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 1px;
    transition: all 0.4s ease;
    border-left: 4px solid #ff0000; /* Default red */
    color: #ff0000;
}

/* Class applied when DB says "online" */
.status-box.is-online {
    border-left: 4px solid #00ff00;
    color: #00ff00;
    box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
}

.container { text-align: center; max-width: 600px; padding: 20px; }
.card { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 25px; border-radius: 20px; margin-bottom: 15px; }
.avatar { width: 100px; height: 100px; border-radius: 20px; object-fit: cover; margin-bottom: 10px; }
.social a { color: gray; margin: 0 12px; font-size: 22px; transition: 0.3s; }
.social a:hover { color: white; transform: translateY(-3px); }
h2 { margin: 10px 0 5px; }
p { color: #888; font-size: 15px; }
</style>
</head>
<body>

<div id="status-indicator" class="status-box">● OFFLINE</div>

<div class="container">
    <div class="card">
        <img class="avatar" src="https://i.ibb.co/84R6QK11/adiyogi-lord-shiva-1080x1920-14420.png" alt="Avatar">
        <h2>Prasanna Sapkota</h2>
        <p>Future Developer • Grade 9</p>
    </div>

    <div class="card">
        <p>I am Prasanna Sapkota (DAKU). Learning Python and building my future in development.</p>
    </div>

    <div class="card social">
        <a href="https://www.facebook.com/share/18G5JyVsy4/"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/coding_with_dakuu"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/9779748303931"><i class="fab fa-whatsapp"></i></a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBxCJJLsZQtlwPyW3gWvl2dO25-eSpOYEg",
  databaseURL: "https://ff-tournament-app-abcf0-default-rtdb.firebaseio.com",
  projectId: "ff-tournament-app-abcf0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// STRICT MANUAL LISTENER
// This only changes when the database value actually changes
db.ref("status").on("value", (snapshot) => {
    const status = snapshot.val();
    const el = document.getElementById("status-indicator");

    if (status === "online") {
        el.innerText = "● ONLINE";
        el.classList.add("is-online");
    } else {
        el.innerText = "● OFFLINE";
        el.classList.remove("is-online");
    }
});
</script>

</body>
</html>
