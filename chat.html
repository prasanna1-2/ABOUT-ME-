<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAKU AI CHAT</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
    margin:0;
    background:#030303;
    color:white;
    font-family:'Outfit',sans-serif;
}

.header{
    background:#0c0c0c;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:800;
}

.back-btn{
    position:fixed;
    top:15px;
    left:15px;
    background:#111;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:50px;
    cursor:pointer;
}

.chat-area{
    padding:20px;
    max-width:600px;
    margin:auto;
}

.bot-msg{
    padding:14px;
    border-radius:15px;
    margin-bottom:12px;
    background:#111;
}

.option-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#00ff66;
    color:black;
    font-weight:800;
    cursor:pointer;
    transition:0.3s;
}

.option-btn:hover{
    background:#00cc55;
}

.request-box{
    display:none;
    margin-top:20px;
    background:#0c0c0c;
    padding:15px;
    border-radius:15px;
    border:1px solid #1a1a1a;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    outline:none;
    background:#111;
    color:white;
    box-sizing:border-box;
}

.send-btn{
    width:100%;
    padding:12px;
    background:#00ff66;
    border:none;
    font-weight:800;
    cursor:pointer;
    border-radius:10px;
}

.send-btn:hover{
    background:#00cc55;
}

.status{
    margin-top:10px;
    text-align:center;
    font-weight:bold;
}

</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅ BACK</button>

<div class="header">💬 DAKU AI CHAT</div>

<div class="chat-area">

    <div class="bot-msg">

        👋 Welcome to DAKU AI <br><br>

        <button class="option-btn" onclick="reply(1)">
            1️⃣ Who is DAKU?
        </button>

        <button class="option-btn" onclick="reply(2)">
            2️⃣ What does DAKU do?
        </button>

        <button class="option-btn" onclick="reply(3)">
            3️⃣ Help services?
        </button>

        <button class="option-btn" onclick="reply(4)">
            4️⃣ Submit email info for response from team 
        </button>

    </div>

    <!-- FORM -->
    <div class="request-box" id="formBox">

        <h3>📩 Join DAKU Website</h3>

        <input type="text" id="name" placeholder="Your Name">

        <input type="email" id="email" placeholder="Your Gmail">

        <button class="send-btn" onclick="sendAll()">
            SUBMIT
        </button>

        <div class="status" id="status"></div>

    </div>

</div>

<script>

/* =========================
   🔥 FIREBASE CONFIG
========================= */

const firebaseConfig = {

  apiKey: "AIzaSyBxCJJLsZQtlwPyW3gWvl2dO25-eSpOYEg",

  authDomain:
  "https://ff-tournament-app-abcf0-default-rtdb.firebaseio.com",

  databaseURL:
  "https://ff-tournament-app-abcf0-default-rtdb.firebaseio.com",

  projectId: "ff-tournament-app-abcf0"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* =========================
   📩 EMAILJS INIT
========================= */

emailjs.init("6hVp-v3KBj6K_nzhw");

/* =========================
   ⬅ BACK BUTTON
========================= */

function goBack(){
    window.location.href = "index.html";
}

/* =========================
   💬 CHAT BUTTONS
========================= */

function reply(opt){

    if(opt == 1){
        alert("👑 DAKU = Prasanna Sapkota");
    }

    if(opt == 2){
        alert("💻 Builds AI + Firebase setup + Dollor card creation  + Website design");
    }

    if(opt == 3){
        alert("✔ Account recovery  Help\n✔ Website design\n✔ Firebase Setup + Dollor card creation ");
    }

    if(opt == 4){
        document.getElementById("formBox").style.display = "block";
    }
}

/* =========================
   🚀 MAIN SUBMIT FUNCTION
========================= */

function sendAll(){

    let name =
    document.getElementById("name").value.trim();

    let email =
    document.getElementById("email").value.trim();

    let status =
    document.getElementById("status");

    if(!name || !email){

        status.innerHTML =
        "⚠ Please fill all fields";

        return;
    }

    status.innerHTML =
    "⏳ Submitting...";

    /* =========================
       🔥 SAVE TO FIREBASE
    ========================= */

    db.ref("submissions").push({

        name: name,
        email: email,
        time: new Date().toString()

    })

    .then(() => {

        /* =========================
           📩 SEND EMAIL
        ========================= */

        return emailjs.send(

            "service_dhuan7g",

            "template_7uadk81",

            {

                to_email: email,

                user_name: name,

                subject:
                "Thank You for Visiting Our Website",

                message:
`Hello ${name},

Thank you for visiting our website. We truly appreciate your time and interest.

We hope you had a great experience. If you need any help or support, feel free to contact us anytime.

Best regards,
DAKU Team`

            }

        );

    })

    .then(() => {

        status.innerHTML =
        "✅ Submitted Successfully & Email Sent!";

        document.getElementById("name").value = "";
        document.getElementById("email").value = "";

        setTimeout(() => {

            document.getElementById("formBox").style.display = "none";

            status.innerHTML = "";

        }, 3000);

    })

    .catch((error) => {

        console.log("FULL ERROR:", error);

        status.innerHTML =
        "❌ Failed to submit";

        alert(
          "ERROR:\n\n" +
          JSON.stringify(error)
        );

    });

}

</script>

</body>
</html>
