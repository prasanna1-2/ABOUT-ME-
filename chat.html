<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAKU AI CHAT - FULL PRO</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script><script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script><style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Outfit',sans-serif;
    background: radial-gradient(circle at top,#050505,#000);
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#00ff88;
    filter:blur(180px);
    top:-120px;
    left:-120px;
    opacity:0.18;
    animation:float 6s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(50px)}
}

.header{
    text-align:center;
    padding:18px;
    font-size:24px;
    font-weight:800;
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.back-btn{
    position:fixed;
    top:15px;
    left:15px;
    padding:10px 14px;
    border-radius:50px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:#fff;
    cursor:pointer;
    z-index:10;
}

.chat-area{
    max-width:650px;
    margin:30px auto;
    padding:20px;
}

.bot-msg{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    padding:18px;
    border-radius:18px;
    backdrop-filter:blur(12px);
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

.option-btn{
    width:100%;
    margin-top:10px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:800;
    cursor:pointer;
    background:linear-gradient(135deg,#00ff88,#00cc66);
    transition:0.25s;
}

.option-btn:hover{transform:scale(1.03)}
.option-btn:active{transform:scale(0.95)}

.request-box{
    display:none;
    margin-top:20px;
    padding:18px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    animation:fadeIn 0.4s ease;
}

input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:#fff;
    outline:none;
}

input:focus{
    box-shadow:0 0 15px rgba(0,255,136,0.25);
}

.send-btn{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:800;
    cursor:pointer;
    background:#00ff88;
    transition:0.3s;
}

.send-btn:hover{transform:scale(1.05)}

.alert-backdrop{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:9999;
}

.alert-card{
    width:280px;
    padding:20px;
    border-radius:18px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    animation:pop 0.3s ease;
}

@keyframes pop{
    from{transform:scale(0.7);opacity:0}
    to{transform:scale(1);opacity:1}
}

.alert-icon{font-size:40px;animation:bounce 1s infinite}

@keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
}

.alert-btn{
    margin-top:12px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:#00ff88;
    font-weight:800;
    cursor:pointer;
}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    padding:12px 18px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    display:none;
    animation:fadeIn 0.3s ease;
}

</style></head><body><button class="back-btn" onclick="goBack()">⬅</button>

<div class="header">💬 DAKU AI CHAT - FULL PRO</div><div class="chat-area"><div class="bot-msg">
👋 Welcome to DAKU AI<button class="option-btn" onclick="reply(1)">👑 Who is DAKU?</button> <button class="option-btn" onclick="reply(2)">💻 What does DAKU do?</button> <button class="option-btn" onclick="reply(3)">⚡ Help services</button> <button class="option-btn" onclick="reply(4)">📩 Submit email info</button>

</div><div class="request-box" id="formBox">
<h3>📩 Join DAKU Website</h3>
<input id="name" placeholder="Your Name">
<input id="email" placeholder="Your Email">
<button class="send-btn" onclick="sendAll()">SUBMIT</button>
<div id="status"></div>
</div></div><div class="alert-backdrop" id="alertBox">
<div class="alert-card">
<div class="alert-icon">⚡</div>
<div id="alertMsg"></div>
<button class="alert-btn" onclick="closeAlert()">OK</button>
</div>
</div><div class="toast" id="toast"></div><script>

function showAlert(msg){
    document.getElementById("alertMsg").innerText = msg;
    document.getElementById("alertBox").style.display = "flex";
}

function closeAlert(){
    document.getElementById("alertBox").style.display = "none";
}

function toast(msg){
    let t=document.getElementById("toast");
    t.innerText=msg;
    t.style.display="block";
    setTimeout(()=>t.style.display="none",2000);
}

window.alert=showAlert;

const firebaseConfig = {
  apiKey: "AIzaSyBxCJJLsZQtlwPyW3gWvl2dO25-eSpOYEg",
  authDomain: "https://ff-tournament-app-abcf0-default-rtdb.firebaseio.com",
  databaseURL: "https://ff-tournament-app-abcf0-default-rtdb.firebaseio.com",
  projectId: "ff-tournament-app-abcf0"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

emailjs.init("6hVp-v3KBj6K_nzhw");

const SERVICE_ID="service_dhuan7g";
const TEMPLATE_ID="template_7uadk81";

function goBack(){window.location.href="index.html";}

function reply(opt){
    if(opt==1) alert("👑 DAKU = Prasanna Sapkota");
    if(opt==2) alert("💻 AI + Firebase + Full System");
    if(opt==3) alert("⚡ Support + Development");
    if(opt==4){toast("Form opened");document.getElementById("formBox").style.display="block";}
}

function sendAll(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let status=document.getElementById("status");

if(!name||!email){toast("Fill all fields");return;}

status.innerHTML="Sending...";

toast("Saving...");

db.ref("submissions").push({name,email,time:new Date().toISOString()})
.then(()=>emailjs.send(SERVICE_ID,TEMPLATE_ID,{to_email:email,user_name:name}))
.then(()=>{
    status.innerHTML="Done";
    toast("Email sent");
    showAlert("🎉 Success!");
    document.getElementById("name").value="";
    document.getElementById("email").value="";
})
.catch(()=>showAlert("❌ Error"));

}

</script></body>
</html>
